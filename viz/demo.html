<!DOCTYPE html>
<html>
<head>
  <title>eCenter Traffic Monitor — Demo</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="https://unpkg.com/uplot/dist/uPlot.iife.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/uplot/dist/uPlot.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }
    #header { padding: 10px 16px; border-bottom: 1px solid #21262d; font-size: 12px; color: #8b949e; display: flex; gap: 20px; align-items: center; }
    #header span { color: #58a6ff; font-weight: bold; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 4px; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #topo-pane { flex: 1; }
    #network { width: 100%; height: 100%; }
    #detail-pane { width: 500px; border-left: 1px solid #21262d; display: none; flex-direction: column; overflow-y: auto; }
    #detail-header { padding: 12px 16px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
    #detail-title { color: #58a6ff; font-size: 13px; }
    #close-btn { cursor: pointer; background: none; border: none; color: #8b949e; font-size: 16px; }
    #close-btn:hover { color: #c9d1d9; }
    #plots { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .plot-label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div id="header">
    <span>eCenter</span>
    <span id="tick-counter">tick 0</span>
    <span><span class="dot" style="background:#1f6feb"></span>NIC0 (10.0.0.x)</span>
    <span><span class="dot" style="background:#238636"></span>NIC1 (10.0.1.x)</span>
    <span style="display:flex;align-items:center;gap:4px">
      traffic:
      <span style="background:linear-gradient(to right,#388bfd,#f0a500,#f85149);width:80px;height:8px;border-radius:4px;display:inline-block"></span>
      low→high
    </span>
    <span style="margin-left:auto;color:#484f58">click a flow arc to inspect</span>
  </div>
  <div id="main">
    <div id="topo-pane"><div id="network"></div></div>
    <div id="detail-pane">
      <div id="detail-header">
        <div id="detail-title">—</div>
        <button id="close-btn" onclick="closeDetail()">✕</button>
      </div>
      <div id="plots">
        <div><div class="plot-label">Bytes / second</div><div id="plot-bytes"></div></div>
        <div><div class="plot-label">Packets / second</div><div id="plot-pkts"></div></div>
      </div>
    </div>
  </div>

  <script>
    // ── Layout constants ──────────────────────────────────────────────────────
    const N      = 4;      // nodes per rack
    const SLOT   = 90;     // vertical spacing
    const SRV_X  = -100;   // server column center
    const BOX_W  = 160;    // server box width
    const BOX_H  = 54;     // server box height
    const DIV_X  = SRV_X + 10;          // = -90, divider: server label | NIC area
    const NIC_X  = SRV_X + BOX_W/2 - 10; // = -30, NIC port x (inside box, right side)
    const NIC_DY = 14;     // ±offset from server center for NIC0/NIC1

    function yPos(i) { return i * SLOT - (N - 1) / 2 * SLOT; }

    // ── NIC nodes (only vis.js nodes; server boxes drawn manually) ────────────
    const NIC_NODES = [];
    for (let i = 0; i < N; i++) {
      NIC_NODES.push({
        id: `n0_${i+1}`, title: `NIC0: 10.0.0.${i+1}`,
        x: NIC_X, y: yPos(i) - NIC_DY,
        shape: 'dot', size: 7, fixed: {x:true, y:true}, label: '',
        color: { background: '#1f6feb', border: '#388bfd',
                 highlight: {background:'#388bfd', border:'#79c0ff'} },
      });
      NIC_NODES.push({
        id: `n1_${i+1}`, title: `NIC1: 10.0.1.${i+1}`,
        x: NIC_X, y: yPos(i) + NIC_DY,
        shape: 'dot', size: 7, fixed: {x:true, y:true}, label: '',
        color: { background: '#238636', border: '#2ea043',
                 highlight: {background:'#2ea043', border:'#3fb950'} },
      });
    }

    // ── Flow edges — all go top→bottom so curvedCW always arcs to the right ──
    // Different roundness values fan the arcs so they never overlap
    const FLOWS_DEF = [
      { id:'f0', from:'n0_1', to:'n0_2', roundness:0.35 },  // NIC0-A → NIC0-B
      { id:'f1', from:'n0_1', to:'n0_3', roundness:0.60 },  // NIC0-A → NIC0-C (fans wider)
      { id:'f2', from:'n1_1', to:'n1_4', roundness:0.80 },  // NIC1-A → NIC1-D (longest arc)
      { id:'f3', from:'n0_2', to:'n0_4', roundness:0.45 },  // NIC0-B → NIC0-D
      { id:'f4', from:'n1_2', to:'n1_3', roundness:0.30 },  // NIC1-B → NIC1-C
      { id:'f5', from:'n0_3', to:'n1_4', roundness:0.40 },  // NIC0-C → NIC1-D (cross-NIC)
    ];

    const nodes = new vis.DataSet(NIC_NODES);
    const edges = new vis.DataSet(FLOWS_DEF.map(f => ({
      ...f,
      width: 2, arrows: 'to',
      color: { color: '#30363d', highlight: '#f78166' },
      label: '', font: { color: '#8b949e', size: 10, face: 'monospace', align: 'middle' },
      smooth: { type: 'curvedCW', roundness: f.roundness },
    })));

    const network = new vis.Network(
      document.getElementById('network'),
      { nodes, edges },
      { physics: false, interaction: { hover: true }, edges: { selectionWidth: 3 } }
    );

    // ── Draw rack + server boxes + NIC labels (behind vis.js nodes) ──────────
    network.on('beforeDrawing', ctx => {
      const RACK_PAD_X = 22, RACK_PAD_Y = 42;
      const RX = SRV_X - BOX_W/2 - RACK_PAD_X;
      const RY = yPos(0) - BOX_H/2 - RACK_PAD_Y;
      const RW = BOX_W + RACK_PAD_X * 2;
      const RH = (N-1) * SLOT + BOX_H + RACK_PAD_Y * 2;

      // Rack chassis
      ctx.fillStyle = '#161b22';
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 2;
      ctx.fillRect(RX, RY, RW, RH);
      ctx.strokeRect(RX, RY, RW, RH);

      // Rack label
      ctx.fillStyle = '#388bfd';
      ctx.font = 'bold 11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('▣  RACK-1', SRV_X - RACK_PAD_X/2, RY + 16);

      for (let i = 0; i < N; i++) {
        const y  = yPos(i);
        const bx = SRV_X - BOX_W / 2;
        const by = y - BOX_H / 2;

        // U-slot label (outside rack, left)
        ctx.fillStyle = '#484f58';
        ctx.font = '9px monospace';
        ctx.textAlign = 'right';
        ctx.fillText(`U${i+1}`, RX - 5, y + 4);

        // Server box background
        ctx.fillStyle = '#1c2128';
        ctx.strokeStyle = '#21262d';
        ctx.lineWidth = 1;
        ctx.fillRect(bx, by, BOX_W, BOX_H);
        ctx.strokeRect(bx, by, BOX_W, BOX_H);

        // Server name (left section)
        ctx.fillStyle = '#8b949e';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(`node-${String.fromCharCode(65+i)}`, bx + 8, y + 4);

        // Vertical divider
        ctx.strokeStyle = '#30363d';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(DIV_X, by + 5);
        ctx.lineTo(DIV_X, by + BOX_H - 5);
        ctx.stroke();

        // NIC labels (right section, IP only — dots drawn by vis.js on top)
        ctx.font = '9px monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#388bfd';
        ctx.fillText(`10.0.0.${i+1}`, DIV_X + 6, y - NIC_DY + 3);
        ctx.fillStyle = '#2ea043';
        ctx.fillText(`10.0.1.${i+1}`, DIV_X + 6, y + NIC_DY + 3);
      }
    });

    // ── Traffic color scale: blue (low) → amber (mid) → red (high) ──────────
    const TRAFFIC_MAX = 1500;
    function trafficColor(total) {
      const t = Math.min(total / TRAFFIC_MAX, 1);
      let r, g, b;
      if (t < 0.5) {
        const s = t * 2;
        r = Math.round( 56 + (240 -  56) * s);
        g = Math.round(139 + (165 - 139) * s);
        b = Math.round(253 + (  0 - 253) * s);
      } else {
        const s = (t - 0.5) * 2;
        r = Math.round(240 + (248 - 240) * s);
        g = Math.round(165 + ( 81 - 165) * s);
        b = Math.round(  0 + ( 73 -   0) * s);
      }
      return `rgb(${r},${g},${b})`;
    }

    // ── Simulate 1s ticks ────────────────────────────────────────────────────
    const HIST = 60;
    const history = {};
    FLOWS_DEF.forEach(f => {
      history[f.id] = { ts:[], tcp_b:[], udp_b:[], tcp_p:[], udp_p:[] };
    });

    function rand(a, b) { return Math.floor(Math.random() * (b - a) + a); }

    let tick = 0;
    function doTick() {
      document.getElementById('tick-counter').textContent = `tick ${++tick}`;
      const now = Date.now() / 1000;
      FLOWS_DEF.forEach(f => {
        const h = history[f.id];
        const tb = rand(50,600), ub = rand(100,900);
        h.ts.push(now); h.tcp_b.push(tb); h.udp_b.push(ub);
        h.tcp_p.push(rand(20,200)); h.udp_p.push(rand(30,300));
        if (h.ts.length > HIST) {
          h.ts.shift(); h.tcp_b.shift(); h.udp_b.shift(); h.tcp_p.shift(); h.udp_p.shift();
        }
        const total = tb + ub;
        const col = trafficColor(total);
        edges.update({
          id: f.id,
          width: 1 + total / 220,
          label: `${(total/1e3).toFixed(0)}K`,
          color: { color: col, highlight: '#ffffff' },
        });
      });
      if (selectedEdge) refreshPlots(selectedEdge);
    }

    // ── Detail panel ──────────────────────────────────────────────────────────
    let selectedEdge = null, uPlots = [];

    const POPTS = (s1, s2, c1, c2) => ({
      width: 452, height: 155,
      cursor: {show:false}, legend: {show:true},
      axes: [
        { stroke:'#484f58', ticks:{stroke:'#21262d'}, grid:{stroke:'#21262d'} },
        { stroke:'#484f58', ticks:{stroke:'#21262d'}, grid:{stroke:'#21262d'} },
      ],
      series: [{}, {label:s1, stroke:c1, fill:c1+'22', width:1.5},
                   {label:s2, stroke:c2, fill:c2+'22', width:1.5}],
      scales: { x: {time:true} },
    });

    network.on('selectEdge', params => {
      const id = params.edges[0];
      if (!id || !history[id]) return;
      selectedEdge = id;
      const f = FLOWS_DEF.find(f => f.id === id);
      document.getElementById('detail-title').textContent = `${f.from}  →  ${f.to}`;
      document.getElementById('detail-pane').style.display = 'flex';
      uPlots.forEach(p => p.destroy()); uPlots = [];
      document.getElementById('plot-bytes').innerHTML = '';
      document.getElementById('plot-pkts').innerHTML = '';
      refreshPlots(id);
    });

    network.on('deselectEdge', closeDetail);

    function closeDetail() {
      selectedEdge = null;
      document.getElementById('detail-pane').style.display = 'none';
      uPlots.forEach(p => p.destroy()); uPlots = [];
      network.unselectAll();
    }

    function refreshPlots(id) {
      const h = history[id];
      if (h.ts.length < 2) return;
      const ts = new Float64Array(h.ts);
      const db = [ts, new Float64Array(h.tcp_b), new Float64Array(h.udp_b)];
      const dp = [ts, new Float64Array(h.tcp_p), new Float64Array(h.udp_p)];
      if (!uPlots.length) {
        uPlots.push(new uPlot(POPTS('TCP bytes','UDP bytes','#58a6ff','#3fb950'),
          db, document.getElementById('plot-bytes')));
        uPlots.push(new uPlot(POPTS('TCP pkts','UDP pkts','#d2a8ff','#ffa657'),
          dp, document.getElementById('plot-pkts')));
      } else {
        uPlots[0].setData(db); uPlots[1].setData(dp);
      }
    }

    setInterval(doTick, 1000);
    doTick();
  </script>
</body>
</html>
